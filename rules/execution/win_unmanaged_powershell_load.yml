title: PowerShell Engine Loaded By Unusual Host Process
id: 711b18c1-672d-4b02-8d2a-92d0ba710055
status: experimental
description: Detects the .NET PowerShell engine (System.Management.Automation) being loaded by a process that is not a known PowerShell host, a hallmark of unmanaged PowerShell injection (PSInject, Cobalt Strike powerpick).
references:
    - https://attack.mitre.org/techniques/T1059/001/
    - https://github.com/EmpireProject/PSInject
author: Maxence Barthelemy
date: 2026-07-21
tags:
    - attack.execution
    - attack.t1059.001
logsource:
    category: image_load
    product: windows
detection:
    selection:
        ImageLoaded|endswith:
            - '\System.Management.Automation.dll'
            - '\System.Management.Automation.ni.dll'
    # Anchored to full system paths on purpose: an implant dropped as
    # C:\Users\Public\powershell.exe is exactly what this rule must catch,
    # and an |endswith filter would whitelist it.
    filter_legit_hosts:
        Image|endswith:
            - '\System32\WindowsPowerShell\v1.0\powershell.exe'
            - '\SysWOW64\WindowsPowerShell\v1.0\powershell.exe'
            - '\System32\WindowsPowerShell\v1.0\powershell_ise.exe'
            - '\System32\wsmprovhost.exe'
        Image|startswith: 'C:\Windows\'
    filter_pwsh:
        Image|endswith: '\pwsh.exe'
    condition: selection and not 1 of filter_*
falsepositives:
    - High volume expected without per-environment tuning. Known legitimate .NET hosts of the PowerShell engine include mmc.exe (Exchange/AD snap-ins), ServerManager.exe, Windows Admin Center, sdiagnhost.exe, w3wp.exe, dotnet.exe, SCCM/Intune agents, and monitoring agents. Baseline these before promoting the severity.
level: medium
