title: Scheduled Task Created With Suspicious Payload
id: 6856549b-b7fb-407f-8291-a8a7ff8e23de
status: experimental
description: Detects creation of a scheduled task (Security 4698) whose task content points to user-writable paths or script interpreters, a common persistence primitive.
references:
    - https://attack.mitre.org/techniques/T1053/005/
author: Maxence Barthelemy
date: 2026-07-21
tags:
    - attack.persistence
    - attack.execution
    - attack.t1053.005
logsource:
    product: windows
    service: security
detection:
    selection:
        EventID: 4698
    susp_content:
        TaskContent|contains:
            - '\AppData\'
            - '\Temp\'
            - 'powershell'
            - 'cmd.exe'
            - 'rundll32'
    condition: selection and susp_content
falsepositives:
    - Legitimate software installers registering update tasks from user paths
level: medium
